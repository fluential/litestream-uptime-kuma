services:
  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123 &&
      mc mb --ignore-existing local/uptime-kuma &&
      echo 'Bucket ready'
      "

  uptime-kuma:
    image: litestream-uptime-kuma:test
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      LITESTREAM_ACCESS_KEY_ID: minioadmin
      LITESTREAM_SECRET_ACCESS_KEY: minioadmin123
      LITESTREAM_BUCKET: uptime-kuma
      LITESTREAM_URL: http://minio:9000
      LITESTREAM_PATH: uptime-kuma-db
      LITESTREAM_SYNC_INTERVAL: 5s
      LITESTREAM_SNAPSHOT_INTERVAL: 30s
      UPTIME_KUMA_DB_TYPE: sqlite
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/api/entry-page"]
      interval: 5s
      timeout: 5s
      start_period: 30s
      retries: 10
